baseURL = "https://girltw.ink"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

languageCode = "en-gb"

title = "Girltwink Gaysite"
enableGitInfo = true

pygmentsCodefences  = true
pygmentsUseClasses  = true

copyright = "Unlicense"
enableEmoji = true


[params]
  dateform        = "Jan 2, 2006"
  dateformShort   = "Jan 2"
  dateformNum     = "2006-01-02"
  dateformNumTime = "2006-01-02 15:04 -0700" 


[params.author]
  name = "girltwink"
  #about = "about/"

[blackfriday]
  # hrefTargetBlank = true
  # noreferrerLinks = true
  # nofollowLinks = true

  shareSocial = true


  [[params.socialLinks]]
    name = "x"
    url = "https://twitter.com/_girltwink"

  [[params.socialLinks]]
    name = "github"
    url = "https://github.com/girltwink"

[menu]

  [[menu.main]]
    name = "Posts"
    url = "posts/"
    weight = 10

  [[menu.main]]
    name = "About"
    url = "about/"
    weight = 20